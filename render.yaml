services:
  - type: web
    name: versianer-onlineshops-funnel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 60 tools.serve:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: LEAD_WEBHOOK_URL
        sync: false   # bewusst NICHT im (oeffentlichen) Repo -- Wert manuell im Render-Dashboard setzen
      - key: DNO_LEAD_WEBHOOK_URL
        sync: false   # D&O-Lead-Webhook, eigenes Make-Szenario -- Wert manuell im Render-Dashboard setzen
